; Настройки CopyPhoto для оператора.
; Строки, начинающиеся с символа ; или #, являются комментариями.
; Программа их не обрабатывает. Пустые строки также можно оставлять.

[Каталоги]

; Папка с исходными изображениями HEIC, HEIF, JPEG и PNG.
; Можно указать путь относительно папки программы или полный путь.
Входные изображения = input

; Папка, в которую записываются отдельные готовые фотографии.
; Можно указать путь относительно папки программы или полный путь.
Готовые фотографии = output

; Папка для отобранных итоговых фотографий.
; В неё файлы перемещаются вручную из графического интерфейса.
; Удаление файлов из этой папки через CopyPhoto запрещено.
Итоговые фотографии = final

[Сохранение]

; Формат готовых фотографий. Возможные значения: png, jpg или jpeg.
; Значения jpg и jpeg обозначают один и тот же формат.
; PNG сохраняется без потерь, JPEG создаёт файлы меньшего размера.
Формат = jpeg

; Текст в начале имени каждого готового файла.
; Нельзя использовать символы: < > : " / \ | ? *
Префикс имени = photo

; Минимальное количество цифр в последовательном номере файла.
; Например, значение 4 создаёт имя photo_0001.png.
Количество цифр = 6

; Качество JPEG от 1 до 100. Для формата PNG значение не используется.
Качество JPEG = 91


[Обработка]

; Поворачивать вертикальные фотографии длинной стороной по горизонтали.
; Возможные значения: Да или Нет.
Поворачивать портретные в альбомные = Да

; Режим первичной коррекции.
; Возможные значения: Без коррекции или Мягкая.
Режим коррекции = Мягкая

; Сила мягкой коррекции в процентах от 0 до 100.
; Консервативное рекомендуемое значение: 25.
; В режиме «Без коррекции» значение не используется.
Интенсивность коррекции = 25


[Диагностика]

; Создавать изображения с найденными и отклонёнными контурами и масками.
; Возможные значения: Да или Нет.
Режим отладки = Да

; Каталог диагностических файлов.
; Используется только при включённом режиме отладки.
; Можно указать путь относительно папки программы или полный путь.
Каталог = debug
